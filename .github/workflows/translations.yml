name: Translations

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/locales/**'
      - 'frontend/public/locales/**'
  pull_request:
    paths:
      - 'frontend/src/locales/**'
      - 'frontend/public/locales/**'

concurrency:
  group: translations
  cancel-in-progress: true

# Read-only — this workflow verifies the committed status files are up to
# date, rather than auto-pushing. Protected-branch rules reject bot pushes
# (required status checks can't pass on the bot's own commit yet), so any
# auto-commit attempt loops forever. Regenerate locally before pushing:
#   cd frontend && bun run generate:translation-status
permissions:
  contents: read

jobs:
  verify-translation-status:
    name: Verify Translation Status
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Regenerate translation status
        run: cd frontend && bun run generate:translation-status

      - name: Verify committed status matches regenerated
        run: |
          if git diff --quiet TRANSLATIONS.md .github/badges/translations.json; then
            echo "✓ Translation status files are up to date"
          else
            echo "✗ TRANSLATIONS.md or .github/badges/translations.json is out of date."
            echo ""
            echo "Regenerate locally and commit:"
            echo "  cd frontend && bun run generate:translation-status"
            echo ""
            echo "Drift:"
            git diff TRANSLATIONS.md .github/badges/translations.json
            exit 1
          fi
