name: Translations

# Two deliberately separate concerns:
#   * validate — the real, contributor-actionable correctness gate (missing
#     keys, broken {{interpolation}}). This is the check that should fail a
#     translation PR, and the one contributors are told to run locally
#     (`bun run validate:translations`).
#   * status — advisory only. Regenerates TRANSLATIONS.md + the shields.io
#     badge and reports any drift in the job summary, but NEVER fails. Those
#     files are generated artifacts a maintainer refreshes (usually after
#     merge) via `bun run generate:translation-status`; an external
#     contributor is not expected to regenerate them, so drift must not block
#     their PR. Output is deterministic (no date stamp) so it only drifts on
#     real translation changes.

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/locales/**'
      - 'frontend/public/locales/**'
      - 'frontend/scripts/**'
      - '.github/workflows/translations.yml'
  pull_request:
    paths:
      - 'frontend/src/locales/**'
      - 'frontend/public/locales/**'
      - 'frontend/scripts/**'
      - '.github/workflows/translations.yml'

concurrency:
  group: translations-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Translations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: '.bun-version'

      # The translation scripts import only Node built-ins (no third-party
      # deps), so `bun install` is intentionally skipped here.
      - name: Validate translations
        run: cd frontend && bun run validate:translations

  status:
    name: Translation Status (advisory)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: '.bun-version'

      - name: Regenerate translation status
        run: cd frontend && bun run generate:translation-status

      - name: Report drift (advisory — never fails)
        run: |
          if git diff --quiet TRANSLATIONS.md .github/badges/translations.json; then
            echo "✓ Translation status files are up to date" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "### 📋 Translation status is out of date"
              echo ""
              echo "\`TRANSLATIONS.md\` / the badge don't match the locale files."
              echo "**This does not block the PR** — a maintainer regenerates them"
              echo "(usually after merge):"
              echo ""
              echo '```'
              echo "cd frontend && bun run generate:translation-status"
              echo '```'
              echo ""
              echo "<details><summary>Drift</summary>"
              echo ""
              echo '```diff'
              git diff TRANSLATIONS.md .github/badges/translations.json
              echo '```'
              echo ""
              echo "</details>"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::notice title=Translation status out of date::TRANSLATIONS.md/badge will be regenerated by a maintainer. This does not block the PR."
          fi
