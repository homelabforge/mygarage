name: Translations

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/locales/**'
      - 'frontend/public/locales/**'

concurrency:
  group: translations
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-translation-status:
    name: Update Translation Status
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.11'

      - name: Install dependencies
        run: cd frontend && bun install --frozen-lockfile

      - name: Generate translation status
        run: cd frontend && bun run generate:translation-status

      - name: Commit updated status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TRANSLATIONS.md .github/badges/translations.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update translation status"
            git push
          fi
