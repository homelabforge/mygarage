name: "MyGarage CodeQL Config"

# Path filters to exclude test files from analysis
paths-ignore:
  - "**/tests/**"
  - "**/__tests__/**"
  - "**/test_*.py"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/*.spec.ts"

# Only run security-tagged queries — filters out code quality rules
# (py/empty-except, py/mixed-returns, etc.) that are not actionable here.
# Sanitizer barriers in mygarage-models/sanitizers.yml handle remaining
# false positives.
query-filters:
  - include:
      tags contain: security

# Local CodeQL model pack containing project-specific sanitizer barriers.
# Path is relative to the repository root. Must be a directory containing
# qlpack.yml + the data-extension YAML files; a bare .yml file referenced
# via the unsupported "model-extensions:" key is silently dropped by the
# CodeQL Action.
packs:
  - ./.github/codeql/mygarage-models
