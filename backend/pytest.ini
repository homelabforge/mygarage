[pytest]
# Pytest configuration for MyGarage backend tests
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add the backend root to sys.path so tests can use absolute imports
# like ``from tests.migrations.fixtures.fuel_type_locales import all_pairs``
# regardless of how pytest is invoked. CLAUDE.md notes the project uses
# ``PYTHONPATH=.`` for local runs; this ini-side setting makes the same
# rootpath available to CI (which doesn't set PYTHONPATH explicitly).
pythonpath = .

# Asyncio mode for async tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
# Tests must share the fixture loop, otherwise asyncpg connections that
# live on the session-scoped engine get awaited from per-test loops and
# fail with "Future attached to a different loop" / "another operation
# in progress". See https://github.com/homelabforge/mygarage/issues/77.
asyncio_default_test_loop_scope = session

# Markers
markers =
    unit: Unit tests that don't require database
    integration: Integration tests that use the database
    analytics: Analytics-specific tests
    auth: Authentication/authorization tests
    vehicle: Vehicle management tests
    service: Service record tests
    fuel: Fuel record tests
    family: Family multi-user system tests
    slow: Tests that take significant time to run
    migrations: Migration behavior and crash recovery tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Ignore
norecursedirs = .git .tox dist build *.egg venv
